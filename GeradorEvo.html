        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f4f8; /* Um tom levemente mais azulado que slate-50 */
        }
        
        /* Checkbox oculto, estilização baseada no estado :checked no pai */
        .option-checkbox:checked + div {
            background-color: #e0e7ff; /* indigo-100 */
            border-color: #6366f1; /* indigo-500 */
            color: #312e81; /* indigo-900 */
            font-weight: 500;
        }

        .option-checkbox:checked + div svg {
            opacity: 1;
            transform: scale(1);
        }

        /* Animação suave para os painéis */
        .section-content {
            transition: all 0.3s ease-in-out;
            overflow: hidden;
        }
        
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border-left-color: #ffffff;
            animation: spin 1s ease infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #result {
            font-family: 'Lora', serif;
            line-height: 1.8;
            color: #1e293b; /* slate-800 */
        }
        
        /* Estilização para impressão */
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            #resultContainer { border: none; box-shadow: none; }
        }

                                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mb-4 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                                <p class="text-sm">Selecione as opções ao lado e clique em Gerar para criar a nota clínica.</p>
                            </div>

                            <!-- Loading -->
                            <div id="loading" class="hidden absolute inset-0 bg-white/90 z-10 flex flex-col items-center justify-center">
                                <div class="bg-indigo-600 p-3 rounded-full shadow-xl mb-4">
                                    <div class="spinner"></div>
                                </div>
                                <p class="text-indigo-900 font-medium animate-pulse">Consultando IA...</p>
                            </div>

                            <!-- Texto Final -->
                            <div id="result" class="whitespace-pre-wrap text-sm sm:text-base"></div>
                        </div>

                        <!-- Footer com Ações -->
                        <div id="resultActions" class="p-4 border-t border-slate-100 bg-slate-50 rounded-b-xl flex gap-3 hidden">
                            <button id="copyButton" class="flex-1 bg-white border border-slate-300 text-slate-700 font-medium py-2 px-4 rounded-lg hover:bg-slate-100 hover:text-indigo-600 transition flex items-center justify-center gap-2 shadow-sm">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                                Copiar
                            </button>
                        </div>
                    </div>
                    
                    <div id="copyFeedback" class="hidden text-center text-sm text-emerald-600 font-medium bg-emerald-50 py-2 rounded-lg border border-emerald-100">
                        Texto copiado para a área de transferência!
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
        // =================================================================
        // ATENÇÃO: INSIRA SUA API KEY DO GOOGLE GEMINI ABAIXO
        // =================================================================
        const apiKey = ""; // <--- COLE SUA CHAVE DENTRO DAS ASPAS
        // Exemplo: const apiKey = "AIzaSy...";

        document.addEventListener('DOMContentLoaded', () => {
            // Referências DOM
            const form = document.getElementById('checklistForm');
            const generateButton = document.getElementById('generateButton');
            const clearButton = document.getElementById('clearButton');
            const placeholder = document.getElementById('placeholder');
            const loading = document.getElementById('loading');
            const resultDiv = document.getElementById('result');
            const resultActions = document.getElementById('resultActions');
            const copyButton = document.getElementById('copyButton');
            const copyFeedback = document.getElementById('copyFeedback');
            const sessionDateInput = document.getElementById('sessionDate');
            const resultContainer = document.getElementById('resultContainer');

            // Data padrão: Hoje
            sessionDateInput.valueAsDate = new Date();

            // Lógica de Acordeão (Collapsible)
            const toggles = document.querySelectorAll('.toggle-section');
            toggles.forEach(toggle => {
                toggle.addEventListener('click', () => {
                    const content = toggle.nextElementSibling;
                    const arrow = toggle.querySelector('svg:last-child');
                    
                    content.classList.toggle('hidden');
                    if(content.classList.contains('hidden')) {
                         arrow.style.transform = 'rotate(0deg)';
                    } else {
                        arrow.style.transform = 'rotate(180deg)';
                    }
                });
            });

            // Botão Gerar
            generateButton.addEventListener('click', async (e) => {
                e.preventDefault();
                
                // UX: Resetar visualização
                placeholder.classList.add('hidden');
                resultActions.classList.add('hidden');
                loading.classList.remove('hidden');
                resultDiv.innerHTML = '';
                copyFeedback.classList.add('hidden');

                // UX Mobile: Scroll suave até o resultado se estiver em mobile
                if(window.innerWidth < 1024) {
                    resultContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }

                // Coletar Dados
                const formData = new FormData(form);
                const data = {};
                for (const [key, value] of formData.entries()) {
                    if (!data[key]) data[key] = [];
                    data[key].push(value);
                }
                
                // Adicionar a data manualmente pois está fora do form
                data.sessionDate = [sessionDateInput.value];

                const prompt = buildPrompt(data);
                
                try {
                    const generatedText = await callGeminiAPI(prompt);
                    // Formatar Markdown simples para HTML (negrito)
                    const formattedText = generatedText
                        .replace(/\*\*(.*?)\*\*/g, '<strong class="text-indigo-900">$1</strong>')
                        .replace(/\n/g, '<br>');
                    
                    resultDiv.innerHTML = formattedText;
                    resultActions.classList.remove('hidden');
                } catch (error) {
                    console.error("Erro:", error);
                    resultDiv.innerHTML = `<div class="text-red-600 p-4 bg-red-50 rounded-lg border border-red-200">
                        <strong>Erro ao gerar evolução:</strong><br>${error.message}<br><br>
                        <em>Verifique sua conexão ou se inseriu a Chave da API corretamente no código.</em>
                    </div>`;
                } finally {
                    loading.classList.add('hidden');
                }
            });

            // Botão Limpar
            clearButton.addEventListener('click', () => {
                form.reset();
                sessionDateInput.valueAsDate = new Date();
                
                // Limpar checkboxes visuais (se houver lógica customizada, mas aqui é CSS puro no :checked)
                // Limpar resultado
                placeholder.classList.remove('hidden');
                resultDiv.innerHTML = '';
                resultActions.classList.add('hidden');
            });

            // Botão Copiar
            copyButton.addEventListener('click', () => {
                const textToCopy = resultDiv.innerText; // Pega apenas o texto, sem tags HTML
                
                navigator.clipboard.writeText(textToCopy).then(() => {
                    copyFeedback.classList.remove('hidden');
                    setTimeout(() => copyFeedback.classList.add('hidden'), 3000);
                }).catch(err => {
                    // Fallback antigo se navigator falhar
                    const tempTextArea = document.createElement('textarea');
                    tempTextArea.value = textToCopy;
                    document.body.appendChild(tempTextArea);
                    tempTextArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(tempTextArea);
                    
                    copyFeedback.classList.remove('hidden');
                    setTimeout(() => copyFeedback.classList.add('hidden'), 3000);
                });
            });

            // Construção do Prompt (Aprimorada)
            function buildPrompt(data) {
                const sessionDate = data.sessionDate?.[0] ? new Date(data.sessionDate[0]).toLocaleDateString('pt-BR', { timeZone: 'UTC' }) : "Hoje";
                
                let promptText = `Aja como um profissional especialista em Análise do Comportamento Aplicada (ABA) e desenvolvimento atípico (Autismo).\n`;
                promptText += `Sua tarefa é redigir uma EVOLUÇÃO CLÍNICA (Relatório de Sessão) técnica, formal e objetiva para prontuário médico.\n\n`;
                
                promptText += `**DADOS DA SESSÃO:**\n`;
                promptText += `Data: ${sessionDate}\n`;
                
                // Helper para formatar listas
                const formatList = (items, obs) => {
                    let text = items ? items.join(', ') : 'Não informado';
                    if (obs && obs[0]) text += `. (Obs: ${obs[0]})`;
                    return text;
                };

                promptText += `\n**REGISTROS OBTIDOS (Checklist):**\n`;
                promptText += `1. CHEGADA/ACOLHIMENTO: ${formatList(data.condicoes_chegada, data.obs_condicoes_chegada)}\n`;
                promptText += `2. ATIVIDADES E RECURSOS: ${formatList(data.atividades, data.obs_atividades)}\n`;
                promptText += `3. ANÁLISE COMPORTAMENTAL: ${formatList(data.comportamentos)}\n`;
                promptText += `4. ESTRATÉGIAS DE MANEJO: ${formatList(data.estrategias, data.obs_comportamentos)}\n`;
                
                const intercorrencias = data.intercorrencias ? [...data.intercorrencias] : [];
                if (data.intercorrencias_outro?.[0]) intercorrencias.push(data.intercorrencias_outro[0]);
                promptText += `5. INTERCORRÊNCIAS: ${intercorrencias.join(', ') || 'Nenhuma'}\n`;
                
                promptText += `6. ORIENTAÇÕES À FAMÍLIA: ${formatList(data.orientacoes, data.obs_orientacoes)}\n`;
                promptText += `7. PLANEJAMENTO FUTURO: ${formatList(data.programacao, data.obs_programacao)}\n`;

                promptText += `\n**DIRETRIZES OBRIGATÓRIAS DE ESCRITA:**\n`;
                promptText += `- Use linguagem técnica de saúde/psicologia (ex: "paciente apresentou", "foi observado", "mediante suporte físico").\n`;
                promptText += `- Escreva SEMPRE na 3ª pessoa. Nunca use "eu fiz" ou "nós fizemos".\n`;
                promptText += `- Seja conciso, mas integre os dados do checklist em parágrafos coesos, evitando apenas listar tópicos soltos dentro do texto corrido.\n`;
                promptText += `- Utilize termos técnicos adequados (regulação emocional, estereotipias, reforço positivo, generalização, treino de habilidades, etc) quando pertinente aos dados fornecidos.\n`;
                promptText += `- Se não houver informações suficientes em algum ponto, foque no que foi fornecido, mas NUNCA invente informações.\n`;
                
                promptText += `\n**ESTRUTURA DA NOTA FINAL:**\n`;
                promptText += `Use exatamente estes títulos em negrito:\n`;
                promptText += `**Condições de Chegada e Acolhimento**\n`;
                promptText += `**Desenvolvimento da Sessão e Atividades**\n`;
                promptText += `**Análise Comportamental e Estratégias**\n`;
                promptText += `**Orientações e Encaminhamentos**\n`;
                promptText += `**Planejamento para Próxima Sessão**\n`;

                return promptText;
            }

            // Chamada API
            async function callGeminiAPI(prompt) {
                const apiKey = "AIzaSyARnyWBScSV46SCTp20H1vgzuecSoled8M";
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`;

                const payload = {
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { temperature: 0.5, topK: 1, topP: 1, maxOutputTokens: 2048 },
                };

                let response;
                let attempts = 0;
                let delay = 1000;

                while (attempts < 5) {
                    try {
                        response = await fetch(apiUrl, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        if (response.ok) {
                            const result = await response.json();
                            if (result.candidates?.[0]?.content?.parts?.[0]?.text) {
                                return result.candidates[0].content.parts[0].text;
                            } else {
                                throw new Error("Resposta da API inválida ou vazia.");
                            }
                        } else if (response.status === 429) {
                            await new Promise(resolve => setTimeout(resolve, delay));
                            delay *= 2;
                            attempts++;
                        } else {
                            const errorText = await response.text();
                            throw new Error(`Erro na API: ${response.status} - ${errorText}`);
                        }
                    } catch (error) {
                        console.error(`Tentativa ${attempts + 1} falhou:`, error);
                        if (attempts >= 4) throw error;
                        await new Promise(resolve => setTimeout(resolve, delay));
                        delay *= 2;
                        attempts++;
                    }
                }
                throw new Error("Falha ao se comunicar com a API após múltiplas tentativas.");
            }
        });
    </script>

</body></html>
